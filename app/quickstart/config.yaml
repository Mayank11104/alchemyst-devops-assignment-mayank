# iii engine configuration
# Docs: https://iii.dev/docs/how-to/configure-engine
#
# DEPLOYMENT NOTE:
#   - iii-http is bound to 0.0.0.0:3111 so Nginx in the public subnet can proxy to it.
#   - inference-worker is intentionally NOT listed here; it runs on a separate VM
#     (inference_worker VM) and connects to the engine via III_URL=ws://<engine-ip>:49134.
#   - caller-worker runs on this same engine VM, managed by iii-worker.

workers:
  - name: iii-observability
    config:
      enabled: true
      service_name: iii
      exporter: memory
      memory_max_spans: 10000
      metrics_enabled: true
      metrics_exporter: memory
      logs_enabled: true
      logs_exporter: memory
      logs_console_output: true
      sampling_ratio: 1.0

  - name: iii-queue
    config:
      adapter:
        name: builtin

  - name: iii-state
    config:
      adapter:
        name: kv
        config:
          store_method: file_based
          file_path: ./data/state_store.db

  - name: iii-http
    config:
      port: 3111
      host: 0.0.0.0        # Changed from 127.0.0.1 — must be 0.0.0.0 for Nginx cross-VM proxy
      default_timeout: 30000
      concurrency_request_limit: 1024
      cors:
        allowed_origins:
        - '*'
        allowed_methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS

  - name: caller-worker
    worker_path: ./workers/caller-worker
