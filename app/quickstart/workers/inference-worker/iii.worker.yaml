name: math-worker
runtime:
  language: python
  package_manager: pip
  entry: inference_worker.py
scripts:
  install: "pip install -r requirements.txt"
  start: "python inference_worker.py"   # prod: removed watchfiles watcher
resources:
  memory: 8192   # MiB — requires t3.xlarge (16 GB) in production
  cpus: 4        # vCPUs — requires t3.xlarge in production
